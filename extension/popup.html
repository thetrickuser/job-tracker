<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Save Job</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        width: 320px;
        padding: 20px;
        background-color: #f5f5f5;
      }

      .container {
        background: white;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h3 {
        margin-bottom: 20px;
        color: #333;
        text-align: center;
      }

      .login-form {
        display: none;
      }

      .login-form.active {
        display: block;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-size: 13px;
        color: #555;
        font-weight: 500;
      }

      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 13px;
        transition: border-color 0.2s;
      }

      input[type="email"]:focus,
      input[type="password"]:focus {
        outline: none;
        border-color: #4caf50;
      }

      button {
        width: 100%;
        padding: 10px 12px;
        font-size: 14px;
        font-weight: 600;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      #loginBtn {
        background-color: #4caf50;
        color: white;
        margin-bottom: 10px;
      }

      #loginBtn:hover {
        background-color: #45a049;
      }

      #logoutBtn {
        background-color: #f44336;
        color: white;
        margin-bottom: 10px;
        display: none;
      }

      #logoutBtn.active {
        display: block;
      }

      #logoutBtn:hover {
        background-color: #da190b;
      }

      #saveJobBtn {
        background-color: #2196f3;
        color: white;
        display: none;
      }

      #saveJobBtn.active {
        display: block;
      }

      #saveJobBtn:hover {
        background-color: #0b7dda;
      }

      #status {
        margin-top: 12px;
        min-height: 20px;
        font-size: 13px;
        padding: 8px;
        border-radius: 4px;
        text-align: center;
      }

      #status.error {
        background-color: #ffebee;
        color: #c62828;
        border: 1px solid #ef5350;
      }

      #status.success {
        background-color: #e8f5e9;
        color: #2e7d32;
        border: 1px solid #81c784;
      }

      #status.loading {
        background-color: #e3f2fd;
        color: #1565c0;
        border: 1px solid #42a5f5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h3>Job Saver</h3>

      <!-- Login Form -->
      <form id="loginForm" class="login-form active">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="your@email.com"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            required
          />
        </div>
        <button type="submit" id="loginBtn">Login</button>
      </form>

      <!-- Logged In Section -->
      <div id="loggedInSection">
        <button id="saveJobBtn">Save Current Job</button>
        <button id="logoutBtn">Logout</button>
      </div>

      <div id="status"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
